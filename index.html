<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vertic7 | Minimal Urban Fashion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="title-container">
        <img src="logo/logo%231.jpg" alt="Vertic7 Logo" class="logo">
    </header>
        
    <nav class="controls">
        <button class="btn-custom" data-category="zapatos">Zapatos</button>
        <button class="btn-custom" data-category="camisetas">Camisetas</button>
        <button class="btn-custom" data-category="jeans">Pantalones</button>
        <button class="btn-custom" data-category="accesorios">Accesorios</button>
        <button class="btn-custom" data-category="conjuntos">Conjuntos</button>
        <button class="btn-custom" data-category="ropaDeportiva">Ropa Deportiva</button>
        <button class="btn-custom" data-category="utilesDelHogar">Hogar</button> </nav>

    <main>
        <section id="gallery-zapatos" class="gallery" aria-hidden="true">
            <div class="product">
                <img src="zapatos/zapatos.jpg" alt="Zapatos Urbanos 1">
                <button class="buy-btn" data-product="Zapatos Urbanos 1">Comprar</button>
            </div>
            <div class="product">
                <img src="zapatos/zapatos1.jpg" alt="Zapatos Urbanos 2">
                <button class="buy-btn" data-product="Zapatos Urbanos 2">Comprar</button>
            </div>
        </section>

        <section id="gallery-camisetas" class="gallery" aria-hidden="true">
            <div class="product">
                <img src="camisetas/camiseta%231.jpg" alt="Camiseta Básica 1">
                <button class="buy-btn" data-product="Camiseta Básica 1">Comprar</button>
            </div>
        </section>

        <section id="gallery-jeans" class="gallery" aria-hidden="true">
            <div class="product">
                <img src="jeans/jeans.jpg" alt="Jean Slim Fit">
                <button class="buy-btn" data-product="Jean Slim Fit">Comprar</button>
            </div>
        </section>

        <section id="gallery-accesorios" class="gallery" aria-hidden="true"><p class="placeholder">Próximamente accesorios.</p></section>
        <section id="gallery-conjuntos" class="gallery" aria-hidden="true"><p class="placeholder">Próximamente conjuntos.</p></section>
        <section id="gallery-ropa-deportiva" class="gallery" aria-hidden="true"><p class="placeholder">Próximamente ropa deportiva.</p></section>
        <section id="gallery-utiles-del-hogar" class="gallery" aria-hidden="true"><p class="placeholder">Próximamente útiles del hogar.</p></section>
    </main>

    <footer class="footer-info">
        <p>vertic7 &copy; 2023</p>
        <p style="margin-top: 10px;">Explora nuestra colección de moda urbana con estilo único y vanguardista.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
